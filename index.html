<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Feel Lab</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Game Feel Lab</h1>
          <p>Balanced profile · live sandbox</p>
        </div>
        <div class="topbar-actions">
          <button id="resetBtn" class="icon-button" type="button" title="Reset simulation" aria-label="Reset simulation">
            <span aria-hidden="true">R</span>
          </button>
          <button id="shareBtn" type="button">Share URL</button>
          <button id="exportBtn" class="primary-button" type="button">Export JSON</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel control-panel" aria-label="Movement tuning controls">
          <section>
            <div class="section-title">
              <h2>Movement</h2>
              <span id="presetName">Balanced</span>
            </div>
            <div class="preset-row" role="group" aria-label="Presets">
              <button class="preset active" data-preset="balanced" type="button">Balanced</button>
              <button class="preset" data-preset="floaty" type="button">Floaty</button>
              <button class="preset" data-preset="snappy" type="button">Snappy</button>
              <button class="preset" data-preset="heavy" type="button">Heavy</button>
              <button class="preset" data-preset="speedrun" type="button">Speedrun</button>
              <button class="preset" data-preset="moon" type="button">Moon</button>
            </div>
            <label class="control">
              <span>Run speed <strong data-value-for="runSpeed"></strong></span>
              <input id="runSpeed" type="range" min="180" max="720" step="10" />
            </label>
            <label class="control">
              <span>Acceleration <strong data-value-for="acceleration"></strong></span>
              <input id="acceleration" type="range" min="600" max="5000" step="100" />
            </label>
            <label class="control">
              <span>Friction <strong data-value-for="friction"></strong></span>
              <input id="friction" type="range" min="400" max="6000" step="100" />
            </label>
            <label class="control">
              <span>Turn accel <strong data-value-for="turnAcceleration"></strong></span>
              <input id="turnAcceleration" type="range" min="1000" max="7000" step="100" />
            </label>
          </section>

          <section>
            <div class="section-title">
              <h2>Air</h2>
            </div>
            <label class="control">
              <span>Jump velocity <strong data-value-for="jumpVelocity"></strong></span>
              <input id="jumpVelocity" type="range" min="420" max="1100" step="10" />
            </label>
            <label class="control">
              <span>Gravity <strong data-value-for="gravity"></strong></span>
              <input id="gravity" type="range" min="900" max="3200" step="50" />
            </label>
            <label class="control">
              <span>Jump cut <strong data-value-for="jumpCutMultiplier"></strong></span>
              <input id="jumpCutMultiplier" type="range" min="1" max="4" step="0.05" />
            </label>
            <label class="control">
              <span>Fall gravity <strong data-value-for="fallGravityMultiplier"></strong></span>
              <input id="fallGravityMultiplier" type="range" min="1" max="4" step="0.05" />
            </label>
            <label class="control">
              <span>Max fall speed <strong data-value-for="maxFallSpeed"></strong></span>
              <input id="maxFallSpeed" type="range" min="500" max="1800" step="25" />
            </label>
            <label class="control">
              <span>Air control <strong data-value-for="airControl"></strong></span>
              <input id="airControl" type="range" min="0.15" max="1" step="0.05" />
            </label>
            <label class="control">
              <span>Coyote time <strong data-value-for="coyoteTime"></strong></span>
              <input id="coyoteTime" type="range" min="0" max="180" step="10" />
            </label>
            <label class="control">
              <span>Jump buffer <strong data-value-for="jumpBuffer"></strong></span>
              <input id="jumpBuffer" type="range" min="0" max="180" step="10" />
            </label>
          </section>

          <section>
            <div class="section-title">
              <h2>Impact</h2>
            </div>
            <label class="control">
              <span>Dash force <strong data-value-for="dashForce"></strong></span>
              <input id="dashForce" type="range" min="250" max="1100" step="10" />
            </label>
            <label class="control">
              <span>Dash duration <strong data-value-for="dashDuration"></strong></span>
              <input id="dashDuration" type="range" min="60" max="360" step="10" />
            </label>
            <label class="control">
              <span>Dash cooldown <strong data-value-for="dashCooldown"></strong></span>
              <input id="dashCooldown" type="range" min="150" max="1000" step="10" />
            </label>
            <label class="control">
              <span>Air dashes <strong data-value-for="airDashCount"></strong></span>
              <input id="airDashCount" type="range" min="0" max="3" step="1" />
            </label>
            <label class="control">
              <span>Hit stop <strong data-value-for="hitStop"></strong></span>
              <input id="hitStop" type="range" min="0" max="180" step="10" />
            </label>
            <label class="control">
              <span>Shake <strong data-value-for="shake"></strong></span>
              <input id="shake" type="range" min="0" max="20" step="1" />
            </label>
            <label class="control">
              <span>Landing impact <strong data-value-for="landingImpact"></strong></span>
              <input id="landingImpact" type="range" min="0" max="20" step="1" />
            </label>
          </section>
        </aside>

        <section class="stage-column">
          <div class="canvas-wrap">
            <canvas id="stage" width="960" height="540" aria-label="Interactive movement sandbox"></canvas>
            <div class="touch-controls" aria-label="Touch controls">
              <button data-hold="left" type="button">Left</button>
              <button data-hold="right" type="button">Right</button>
              <button data-action="jump" type="button">Jump</button>
              <button data-action="dash" type="button">Dash</button>
              <button data-action="hit" type="button">Hit</button>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat">
              <span>Apex</span>
              <strong id="apexStat">0 px</strong>
            </div>
            <div class="stat">
              <span>Air time</span>
              <strong id="airTimeStat">0 ms</strong>
            </div>
            <div class="stat">
              <span>Dash distance</span>
              <strong id="dashStat">0 px</strong>
            </div>
            <div class="stat">
              <span>Intensity</span>
              <strong id="intensityStat">0</strong>
            </div>
          </div>
          <div class="profile-row" aria-label="Feel profile metrics">
            <div><span>Speed</span><meter id="speedMeter" min="0" max="100"></meter></div>
            <div><span>Precision</span><meter id="precisionMeter" min="0" max="100"></meter></div>
            <div><span>Float</span><meter id="floatMeter" min="0" max="100"></meter></div>
            <div><span>Impact</span><meter id="impactMeter" min="0" max="100"></meter></div>
            <div><span>Access</span><meter id="accessibilityMeter" min="0" max="100"></meter></div>
          </div>
        </section>

        <aside class="panel analysis-panel" aria-label="Analysis and export">
          <section>
            <div class="section-title">
              <h2>Jump Arc</h2>
              <span>preview</span>
            </div>
            <canvas id="arc" width="420" height="220" aria-label="Jump arc graph"></canvas>
          </section>

          <section>
            <div class="section-title">
              <h2>Export</h2>
              <span id="exportModeLabel">JSON</span>
            </div>
            <div class="format-row" role="group" aria-label="Export format">
              <button class="format active" data-format="json" type="button">JSON</button>
              <button class="format" data-format="unity" type="button">Unity</button>
              <button class="format" data-format="godot" type="button">Godot</button>
            </div>
            <textarea id="exportText" spellcheck="false" aria-label="Exported tuning JSON"></textarea>
            <div class="utility-row">
              <button id="importBtn" type="button">Import JSON</button>
              <button id="saveABtn" type="button">Save A</button>
              <button id="saveBBtn" type="button">Save B</button>
            </div>
            <p id="statusText" class="status-text" aria-live="polite">Ready</p>
          </section>

          <section>
            <div class="section-title">
              <h2>A/B Compare</h2>
              <span>right minus left</span>
            </div>
            <dl class="compare-grid">
              <div>
                <dt>Apex</dt>
                <dd id="compareApex">0 px</dd>
              </div>
              <div>
                <dt>Air</dt>
                <dd id="compareAir">0 ms</dd>
              </div>
              <div>
                <dt>Dash</dt>
                <dd id="compareDash">0 px</dd>
              </div>
              <div>
                <dt>Intensity</dt>
                <dd id="compareIntensity">0</dd>
              </div>
            </dl>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
